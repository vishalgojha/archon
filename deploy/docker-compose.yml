version: "3.9"

services:
  archon-api:
    build:
      context: ..
      dockerfile: Dockerfile
    command: archon-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ARCHON_HOST: "0.0.0.0"
      ARCHON_PORT: "8000"
      ARCHON_CONFIG: "/app/config.archon.yaml"
      ARCHON_RUNTIME_DIR: "/var/lib/archon"
      ARCHON_DATABASE_BACKEND: "${ARCHON_DATABASE_BACKEND:-sqlite}"
      ARCHON_DATABASE_URL: "${ARCHON_DATABASE_URL:-postgresql://archon:archon@postgres:5432/archon}"
      ARCHON_ANALYTICS_DB: "/var/lib/archon/archon_analytics.sqlite3"
      ARCHON_BILLING_DB: "/var/lib/archon/archon_billing.sqlite3"
      ARCHON_STRIPE_SECRET_KEY: "${ARCHON_STRIPE_SECRET_KEY:-}"
      ARCHON_STRIPE_WEBHOOK_SECRET: "${ARCHON_STRIPE_WEBHOOK_SECRET:-}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318/v1/traces"
    volumes:
      - archon-data:/var/lib/archon
      - ../config.archon.yaml:/app/config.archon.yaml:ro
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - otel-collector
      - postgres

  archon-worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command: python -m archon.deploy.worker
    restart: unless-stopped
    environment:
      ARCHON_CONFIG: "/app/config.archon.yaml"
      ARCHON_RUNTIME_DIR: "/var/lib/archon"
      ARCHON_DATABASE_BACKEND: "${ARCHON_DATABASE_BACKEND:-sqlite}"
      ARCHON_DATABASE_URL: "${ARCHON_DATABASE_URL:-postgresql://archon:archon@postgres:5432/archon}"
      ARCHON_ANALYTICS_DB: "/var/lib/archon/archon_analytics.sqlite3"
      ARCHON_BILLING_DB: "/var/lib/archon/archon_billing.sqlite3"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318/v1/traces"
    volumes:
      - archon-data:/var/lib/archon
      - ../config.archon.yaml:/app/config.archon.yaml:ro
    depends_on:
      - archon-api
      - otel-collector

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "archon"
      POSTGRES_USER: "archon"
      POSTGRES_PASSWORD: "archon"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.97.0
    restart: unless-stopped
    command:
      - "--config=/etc/otelcol-contrib/config.yaml"
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro

volumes:
  archon-data: {}
  postgres-data: {}
