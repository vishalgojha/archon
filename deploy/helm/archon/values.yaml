replicaCount: 2

image:
  repository: archon
  tag: 0.1.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: nginx
  host: archon.local
  path: /

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

persistence:
  enabled: true
  storageClassName: standard
  size: 20Gi

database:
  backend: sqlite
  url: postgresql://archon:archon@postgres:5432/archon

byokSecrets:
  openaiApiKey: ""
  anthropicApiKey: ""
  stripeSecretKey: ""
  stripeWebhookSecret: ""

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi
