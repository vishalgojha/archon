<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARCHON Console</title>
    <style>
      :root {
        --bg: #111111;
        --panel: #1a1a1a;
        --panel-2: #253041;
        --text: #eeeeee;
        --muted: #9ca3af;
        --border: #2d3748;
        --accent: #0f766e;
        --accent-soft: #0d9488;
        --danger: #dc2626;
        --ok: #16a34a;
        --warn: #ca8a04;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      }

      input,
      textarea,
      button,
      select {
        font: inherit;
      }

      .console-root {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .console-header {
        padding: 12px;
        border-bottom: 1px solid var(--border);
        background: rgba(17, 17, 17, 0.95);
      }

      .console-header h1 {
        margin: 0 0 10px 0;
        font-size: 20px;
      }

      .tab-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .tab-row button {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #20262d;
        color: var(--muted);
        padding: 8px 12px;
        cursor: pointer;
      }

      .tab-row button.active {
        background: var(--accent);
        color: #ffffff;
      }

      .console-main {
        min-height: 0;
        overflow: auto;
        padding: 12px;
      }

      .console-pane {
        min-height: calc(100vh - 132px);
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(26, 26, 26, 0.98);
        padding: 12px;
      }

      .console-pane h2 {
        margin-top: 0;
      }

      .provider-row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .provider-row input,
      .provider-row textarea,
      .provider-row select,
      textarea,
      .body-editor-label textarea,
      .auth-gate input,
      .param-form input {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #141821;
        color: var(--text);
        padding: 8px;
      }

      .provider-row button,
      .auth-gate button,
      .api-details button,
      .toolbar-actions button,
      .tab-row button {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #1f2937;
        color: var(--text);
        padding: 8px 10px;
        cursor: pointer;
      }

      .provider-row button:disabled,
      .toolbar-actions button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .muted {
        color: var(--muted);
      }

      .inline-error {
        margin-top: 10px;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid rgba(220, 38, 38, 0.55);
        background: rgba(220, 38, 38, 0.1);
        color: #fecaca;
      }

      .inline-success {
        margin-top: 10px;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid rgba(22, 163, 74, 0.55);
        background: rgba(22, 163, 74, 0.1);
        color: #bbf7d0;
      }

      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
      }

      .badge-ok {
        background: rgba(22, 163, 74, 0.24);
        color: #bbf7d0;
      }

      .badge-warn {
        background: rgba(202, 138, 4, 0.26);
        color: #fde68a;
      }

      .badge-idle {
        background: rgba(100, 116, 139, 0.28);
        color: #cbd5e1;
      }

      .token-strip {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        align-items: center;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        background: rgba(15, 23, 42, 0.8);
      }

      .auth-gate {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }

      .auth-gate input {
        width: min(720px, 92vw);
      }

      .agent-editor-root {
        min-height: 70vh;
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 10px;
      }

      .agent-tree-pane,
      .agent-editor-pane {
        min-height: 0;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(37, 48, 65, 0.24);
      }

      .agent-tree-pane {
        display: flex;
        flex-direction: column;
      }

      .pane-title {
        padding: 10px;
        border-bottom: 1px solid var(--border);
      }

      .pane-empty {
        padding: 10px;
        color: var(--muted);
      }

      .tree-wrap {
        min-height: 0;
        overflow: auto;
        padding: 8px;
      }

      .tree-directory,
      .tree-file {
        width: 100%;
        text-align: left;
        border: 0;
        background: transparent;
        color: var(--text);
        padding: 4px 6px;
        cursor: pointer;
      }

      .tree-file.active {
        border-radius: 6px;
        background: rgba(15, 118, 110, 0.35);
      }

      .directory-node {
        margin-bottom: 4px;
      }

      .directory-node .directory-node,
      .directory-node .tree-file {
        margin-left: 12px;
      }

      .editor-toolbar {
        padding: 10px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .toolbar-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .editor-host {
        height: calc(70vh - 64px);
        min-height: 420px;
      }

      .provider-list {
        display: grid;
        gap: 10px;
      }

      .provider-card {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(20, 24, 33, 0.6);
        padding: 10px;
      }

      .provider-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .provider-meta {
        margin-top: 6px;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 6px;
      }

      .budget-panel {
        margin-top: 14px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
      }

      .api-layout {
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 10px;
        min-height: 70vh;
      }

      .api-route-list,
      .api-details {
        min-height: 0;
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(37, 48, 65, 0.22);
        padding: 8px;
      }

      .api-route-item {
        width: 100%;
        text-align: left;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #141821;
        color: var(--text);
        padding: 8px;
        margin-bottom: 6px;
        cursor: pointer;
      }

      .api-route-item.active {
        border-color: rgba(15, 118, 110, 0.75);
        background: rgba(15, 118, 110, 0.2);
      }

      .route-method {
        display: inline-block;
        width: 72px;
        font-weight: 700;
      }

      .route-path {
        color: var(--muted);
      }

      .api-selected-head {
        margin-bottom: 8px;
      }

      .param-form {
        display: grid;
        gap: 8px;
        margin-bottom: 10px;
      }

      .param-form label,
      .body-editor-label {
        display: grid;
        gap: 4px;
      }

      .body-editor-label textarea {
        width: 100%;
      }

      .api-response {
        margin-top: 10px;
      }

      .api-response pre {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.24);
        padding: 8px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .embed-result {
        margin-top: 12px;
        display: grid;
        gap: 10px;
      }

      .embed-result textarea {
        width: 100%;
      }

      .iframe-preview iframe {
        width: 100%;
        height: 260px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #ffffff;
      }

      @media (max-width: 1000px) {
        .agent-editor-root,
        .api-layout {
          grid-template-columns: 1fr;
        }

        .editor-host {
          min-height: 320px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>

    <script type="text/babel" src="./src/AgentEditor.jsx"></script>
    <script type="text/babel" src="./src/BYOKManager.jsx"></script>
    <script type="text/babel" src="./src/APIExplorer.jsx"></script>
    <script type="text/babel" src="./src/EmbedGenerator.jsx"></script>
    <script type="text/babel" src="./index.js"></script>
  </body>
</html>
