<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARCHON Mission Control</title>
    <style>
      :root {
        --bg: #111111;
        --panel: #1a1a1a;
        --panel-2: #253041;
        --panel-3: #332525;
        --text: #eeeeee;
        --muted: #a7b0be;
        --border: #30363f;
        --accent: #0f766e;
        --accent-soft: #0d9488;
        --ok: #16a34a;
        --warn: #ca8a04;
        --danger: #dc2626;
        --info: #3b82f6;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .dashboard-root {
        height: 100%;
        display: grid;
        grid-template-rows: 56px 1fr 120px;
        overflow: hidden;
        background: radial-gradient(circle at top right, #17202a 0%, var(--bg) 45%);
      }

      .top-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        background: rgba(17, 17, 17, 0.9);
      }

      .brand {
        font-weight: 600;
        letter-spacing: 0.4px;
        margin-right: 8px;
        white-space: nowrap;
      }

      .mode-switch {
        display: inline-flex;
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }

      .mode-switch button {
        border: 0;
        padding: 6px 10px;
        background: #20252c;
        color: var(--muted);
        cursor: pointer;
      }

      .mode-switch button.active {
        background: var(--accent);
        color: #ffffff;
      }

      .connection {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: var(--muted);
        margin-left: 8px;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        display: inline-block;
      }

      .status-dot.connected {
        background: var(--ok);
        box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.25);
      }

      .status-dot.connecting {
        background: var(--info);
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.25);
      }

      .status-dot.disconnected {
        background: var(--warn);
        box-shadow: 0 0 0 4px rgba(202, 138, 4, 0.25);
      }

      .status-dot.error {
        background: var(--danger);
        box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.25);
      }

      .tenant-info {
        margin-left: auto;
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 56%;
      }

      .main-grid {
        min-height: 0;
        display: grid;
        grid-template-columns: 280px 1fr 300px;
        gap: 8px;
        padding: 8px;
      }

      .panel {
        min-height: 0;
        background: rgba(26, 26, 26, 0.95);
        border: 1px solid var(--border);
        border-radius: 12px;
      }

      .left-panel,
      .right-panel {
        padding: 10px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .center-panel {
        min-height: 0;
        display: grid;
        grid-template-rows: 52% 48%;
        gap: 8px;
      }

      .card {
        min-height: 0;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(37, 48, 65, 0.26);
        overflow: hidden;
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        color: var(--muted);
      }

      .card-body {
        min-height: 0;
        height: calc(100% - 38px);
        overflow: auto;
      }

      .swarm-box {
        min-height: 220px;
        height: calc(100% - 40px);
      }

      .federation-pulse {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: rgba(15, 118, 110, 0.08);
        color: var(--muted);
        font-size: 12px;
      }

      .pulse-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: var(--warn);
      }

      .pulse-dot.active {
        background: var(--ok);
        animation: pulse 1.2s infinite ease-in-out;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.35);
        }
        100% {
          box-shadow: 0 0 0 8px rgba(22, 163, 74, 0);
        }
      }

      .approval-empty {
        color: var(--muted);
        font-size: 13px;
      }

      .approval-queue {
        display: grid;
        gap: 8px;
      }

      .approval-item {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
        background: rgba(51, 37, 37, 0.34);
      }

      .approval-item h4 {
        margin: 0 0 6px 0;
        font-size: 13px;
      }

      .approval-item pre {
        margin: 0 0 8px 0;
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--muted);
        font-size: 12px;
        max-height: 96px;
        overflow: auto;
      }

      .approval-footer {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        font-size: 12px;
        color: var(--muted);
      }

      .approval-footer button {
        border: 1px solid var(--border);
        background: #1f2937;
        color: var(--text);
        border-radius: 6px;
        padding: 4px 8px;
        cursor: pointer;
      }

      .approval-footer button:first-child {
        border-color: rgba(22, 163, 74, 0.6);
      }

      .approval-footer button:last-child {
        border-color: rgba(220, 38, 38, 0.6);
      }

      .debate-panel {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .debate-header {
        padding: 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .debate-header h2 {
        margin: 0;
        font-size: 14px;
      }

      .debate-header button {
        border: 1px solid var(--border);
        border-radius: 7px;
        background: #1f2937;
        color: var(--text);
        padding: 4px 8px;
        cursor: pointer;
      }

      .confidence-meter {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 8px;
        padding: 0 8px 8px 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .confidence-track {
        height: 8px;
        border-radius: 99px;
        overflow: hidden;
        background: #242b34;
      }

      .confidence-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--warn), var(--ok));
      }

      .debate-rounds {
        min-height: 0;
        overflow: auto;
        padding: 8px;
        display: grid;
        gap: 8px;
      }

      .round-header {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #1f2937;
        color: var(--text);
        padding: 8px;
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        cursor: pointer;
      }

      .agent-badge {
        color: #ffffff;
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 999px;
      }

      .round-content {
        margin: 6px 0 0 0;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.24);
        color: var(--muted);
        padding: 8px;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 210px;
        overflow: auto;
        font-size: 12px;
      }

      .cost-meter {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 8px;
      }

      .cost-meter p {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      .memory-wrap {
        padding: 8px;
        border-top: 1px solid var(--border);
      }

      .memory-timeline {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .timeline-scroll {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 4px;
      }

      .timeline-entry {
        min-width: 220px;
        max-width: 280px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(37, 48, 65, 0.26);
        color: var(--text);
        padding: 8px;
        text-align: left;
        cursor: pointer;
      }

      .timeline-entry.active {
        border-color: var(--accent-soft);
      }

      .timeline-entry p {
        margin: 6px 0;
        color: var(--muted);
        font-size: 12px;
      }

      .role-badge {
        font-size: 11px;
        color: #d4f4ef;
        background: rgba(15, 118, 110, 0.35);
        border-radius: 999px;
        padding: 2px 6px;
      }

      .causal-arrows {
        display: grid;
        gap: 2px;
        color: var(--muted);
        font-size: 11px;
      }

      .memory-expanded {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.24);
        padding: 8px;
        max-height: 140px;
        overflow: auto;
        color: var(--muted);
        font-size: 12px;
      }

      .memory-expanded h4,
      .memory-expanded h5 {
        margin: 0 0 6px 0;
        color: var(--text);
      }

      .thought-log {
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .thought-log-list {
        margin: 0;
        padding: 8px;
        list-style: none;
        min-height: 0;
        overflow: auto;
        display: grid;
        gap: 6px;
      }

      .thought-log-list li {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.22);
        padding: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .thought-type {
        display: inline-block;
        font-size: 10px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        background: rgba(59, 130, 246, 0.25);
        color: #dbeafe;
        border-radius: 999px;
        padding: 2px 6px;
        margin-bottom: 4px;
      }

      .leaderboard-list {
        display: grid;
        gap: 8px;
        padding: 8px;
      }

      .leaderboard-item {
        display: grid;
        grid-template-columns: 42px 1fr;
        gap: 8px;
        align-items: start;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.22);
        padding: 8px;
      }

      .leaderboard-rank {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        border-radius: 8px;
        background: rgba(15, 118, 110, 0.2);
        color: #d4f4ef;
        font-size: 13px;
        font-weight: 600;
      }

      .leaderboard-main {
        display: grid;
        gap: 6px;
      }

      .leaderboard-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 13px;
      }

      .leaderboard-tenant {
        font-size: 11px;
        color: #dbeafe;
        background: rgba(59, 130, 246, 0.2);
        border-radius: 999px;
        padding: 2px 6px;
        white-space: nowrap;
      }

      .leaderboard-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        color: var(--muted);
        font-size: 11px;
      }

      .leaderboard-score {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 11px;
      }

      .leaderboard-track {
        height: 8px;
        overflow: hidden;
        border-radius: 99px;
        background: #242b34;
      }

      .leaderboard-fill {
        height: 100%;
        border-radius: 99px;
        background: linear-gradient(90deg, #0f766e, #3b82f6);
      }

      .task-dag-shell {
        min-height: 0;
        height: 100%;
        display: grid;
        grid-template-columns: 1fr 260px;
      }

      .task-dag-graph {
        min-height: 0;
        height: 100%;
        padding: 8px;
      }

      .task-dag-graph svg {
        width: 100%;
        height: 100%;
      }

      .task-dag-drawer {
        border-left: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.24);
        overflow: auto;
      }

      .drawer-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px;
        border-bottom: 1px solid var(--border);
      }

      .drawer-header button {
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #1f2937;
        color: var(--text);
        cursor: pointer;
      }

      .drawer-body {
        padding: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .drawer-body h4 {
        margin: 0 0 6px 0;
        color: var(--text);
      }

      .drawer-body pre {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0 0 10px 0;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px;
        background: rgba(0, 0, 0, 0.18);
      }

      .empty-state {
        margin: 12px;
        padding: 10px;
        border: 1px dashed var(--border);
        border-radius: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 1200px) {
        .main-grid {
          grid-template-columns: 240px 1fr 260px;
        }
      }

      @media (max-width: 960px) {
        .dashboard-root {
          grid-template-rows: auto 1fr auto;
          overflow: auto;
        }

        .top-bar {
          flex-wrap: wrap;
        }

        .tenant-info {
          max-width: 100%;
          width: 100%;
          margin-left: 0;
        }

        .main-grid {
          display: flex;
          flex-direction: column;
          min-height: unset;
        }

        .left-panel,
        .right-panel,
        .center-panel {
          min-height: 260px;
        }

        .task-dag-shell {
          grid-template-columns: 1fr;
        }

        .task-dag-drawer {
          border-left: 0;
          border-top: 1px solid var(--border);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>

    <script type="text/babel" src="./src/useARCHON.js"></script>
    <script type="text/babel" src="./src/SwarmGraph.jsx"></script>
    <script type="text/babel" src="./src/TaskDAG.jsx"></script>
    <script type="text/babel" src="./src/DebatePanel.jsx"></script>
    <script type="text/babel" src="./src/CostMeter.jsx"></script>
    <script type="text/babel" src="./src/LeaderboardCard.jsx"></script>
    <script type="text/babel" src="./src/ApprovalQueue.jsx"></script>
    <script type="text/babel" src="./src/MemoryTimeline.jsx"></script>
    <script type="text/babel" src="./src/App.jsx"></script>
    <script type="text/babel" src="./src/index.js"></script>
  </body>
</html>
