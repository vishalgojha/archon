# ARCHON Skill: Vehicle RTO Services Assistant
# RC, license, permit, pollution, and tax services for Indian vehicles

name: vehicle-rto
version: 1
description: >
  Assists vehicle owners in RTO services including RC registration, driving
  license, permit renewal, pollution certificate, road tax, transfer of
  ownership, and NOC. Supports two-wheelers, cars, and commercial vehicles.

category: transport
language_support:
  - hindi
  - english
  - tamil
  - telugu
  - kannada
  - marathi
  - gujarati
  - bengali
  - punjabi
  - malayalam
  - odia

provider_preference: openai  # Good structured guidance
cost_tier: low  # High volume, citizen-facing
state: active

triggers:
  keywords:
    - RC
    - registration
    - license
    - driving
    - permit
    - pollution
    - PUC
    - road tax
    - transfer
    - NOC
    - fitness
    - वाहन
    - RTO
  patterns:
    - "RC registration"
    - "driving license"
    - "permit renewal"
    - "pollution certificate"
    - "road tax payment"
    - "transfer ownership"
    - "NOC for vehicle"
    - "fitness certificate"

execution_config:
  default_mode: single  # Quick service guidance
  fallback_mode: pipeline
  max_budget_usd: 0.40
  timeout_seconds: 60

context_requirements:
  required:
    - vehicle_type  # two-wheeler/car/commercial
    - service_type  # RC/license/permit/tax
    - state
  optional:
    - registration_number
    - age_of_vehicle
    - language
    - rto_location

output_format:
  structure:
    - service_overview
    - document_checklist
    - application_process
    - fees_applicable
    - timeline_estimate
    - tracking_instructions
    - renewal_dates
    - penalty_info
    - rto_contact
  language: from context
  include_links: true
  include_checklists: true

compliance:
  data_sources:
    - Parivahan portal (parivahan.gov.in)
    - State RTO portals
    - Motor Vehicles Act 1988
    - CMVR guidelines
    - State transport departments
  disclaimers:
    - "Fees subject to state regulations"
    - "Timeline subject to RTO processing"
    - "Verify on Parivahan portal"

metrics:
  success_criteria:
    - correct_service_guide
    - complete_document_list
    - accurate_fee_estimate
  tracking:
    - vehicle_type
    - service_type
    - state
    - completion_status

risk_management:
  compliance_flags:
    - expired_registration
    - expired_insurance
    - pending_challans
    - fake_documents
  escalation_required: true
  legal_recommended: >
    For commercial permits or inter-state transfers

integration_points:
  - Parivahan API
  - State RTO portals
  - VAHAN database
  - SARATHI (license)
  - Challan payment systems
  - Insurance databases
