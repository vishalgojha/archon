# ARCHON Skill: Fisheries & Aquaculture
# PMMSY scheme and fishing guidance for Indian fishers

name: fisheries
version: 1
description: >
  Fisheries and aquaculture guidance including PMMSY scheme, fishing licenses,
  aquaculture techniques, cold chain, and market linkage for Indian fishers.

category: agriculture
language_support: [hindi, tamil, telugu, bengali, malayalam, kannada]

provider_preference: openai
cost_tier: low
state: active

triggers:
  keywords:
    - fisheries
    - fishing
    - aquaculture
    - pmmsy
    - fish farming
    - pradhan mantri matsya sampada
    - cold chain
    - fishing license
    - मछली
    - मत्स्य
  patterns:
    - "fish.*farming.*scheme"
    - "pmmsy.*apply"
    - "fishing.*license"
    - "aquaculture.*loan"
    - "cold.*storage.*fish"

execution_config:
  default_mode: single
  max_budget_usd: 0.30
  timeout_seconds: 45

context_requirements:
  required: [fishing_type]
  optional: [state, district, water_body, species, pond_area]

output_format:
  structure: [schemes, techniques, license, market, contacts]
  language: auto-detect from context

compliance:
  data_sources: [DAHD, NFDB, state fisheries dept]
  disclaimers:
    - "Fishing seasons vary by state"
    - "Environmental clearances may be required"

metrics:
  success_criteria: [scheme_matched, license_info, practical_advice]
  tracking: [fishing_type, state, scheme_applied]
