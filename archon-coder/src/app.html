<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Archon Coder</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
        /* Global styles */
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border: #30363d;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --text-muted: #484f58;
            --blue: #58a6ff;
            --green: #7ee787;
            --red: #ff7b72;
            --yellow: #ffa657;
            --purple: #d2a8ff;
            --cyan: #a5d6ff;
            --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body { background: var(--bg-primary); color: var(--text); font-size: 14px; }
        ::selection { background: var(--blue); color: #fff; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
    </style>
</head>
<body>
</body>
</html>
